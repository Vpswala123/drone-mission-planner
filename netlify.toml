[build]
  base = "."
  publish = "frontend/dist"
  command = "cd frontend && npm install && npm run build"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "cd frontend && npm run dev"
  port = 8888
  targetPort = 5173
  publish = "frontend/dist"
  autoLaunch = true
